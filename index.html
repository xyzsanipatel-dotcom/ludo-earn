<h1>Ludo Earn</h1>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<script>
function signup(){
  fetch("/auth/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username:user.value,
      password:pass.value
    })
  }).then(()=>alert("Signup done"));
}

function login(){
  fetch("/auth/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username:user.value,
      password:pass.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    localStorage.setItem("token", d.token);
    alert("Login success");
  });
}
</script>
