<h2>Admin Panel</h2>
<button onclick="load()">Load Users</button>

<div id="users"></div>

<script>
function load(){
  fetch("/admin/users")
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach(u=>{
      html += `<p>${u.username} ₹${u.balance}</p>`;
    });
    document.getElementById("users").innerHTML = html;
  });
}
</script>
